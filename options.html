<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>Civitai 下载助手 - 设置</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background: #f5f5f7; color: #1f1f23; margin: 0; padding: 40px 20px; }
    .card { max-width: 560px; margin: 0 auto; background: #fff; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 24px 28px; }
    h1 { font-size: 18px; margin: 0 0 4px; color: #ff6b35; }
    .sub { color: #6a6a73; font-size: 13px; margin-bottom: 20px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 13px; }
    .desc { color: #6a6a73; font-size: 12px; margin-top: 4px; line-height: 1.5; }
    input[type=text] { width: 100%; padding: 8px 10px; border: 1px solid #d0d0d6; border-radius: 6px; font-size: 13px; font-family: inherit; box-sizing: border-box; }
    .save { margin-top: 8px; padding: 9px 20px; border-radius: 6px; border: 0; background: #ff6b35; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
    .save:hover { background: #ff7d4d; }
    .saved { display: none; color: #2a8a3a; font-size: 12px; margin-left: 10px; }
    .path { background: #f0f0f4; padding: 6px 10px; border-radius: 6px; font-family: Consolas, monospace; font-size: 12px; color: #3a3a42; margin-top: 6px; word-break: break-all; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Civitai 下载助手</h1>
    <div class="sub">配置下载目录命名。</div>
    <div class="field">
      <label for="folder">顶层目录名</label>
      <input type="text" id="folder" placeholder="civitai" />
      <div class="desc">文件保存到「Chrome 下载目录 / 此目录 / 作者名 / id.ext」。留空则直接「下载目录 / 作者 / id.ext」。</div>
    </div>
    <div>
      <button class="save" id="save">保存</button>
      <span class="saved" id="saved">已保存</span>
    </div>
    <div class="path" id="preview">预览路径：下载目录/civitai/&lt;作者&gt;/&lt;id&gt;.jpg</div>

    <hr style="border:0;border-top:1px solid #eee;margin:24px 0;" />
    <div class="field">
      <label>已下载记录（去重）</label>
      <div class="desc">已成功下载过的图片/视频会被记录，再次勾选下载时自动跳过、防止重复下载。</div>
      <div class="path" id="hist-count" style="margin-top:8px;">已记录 0 项</div>
      <button class="save" id="clear-hist" style="background:#6a6a73;margin-top:8px;">清除已下载记录</button>
    </div>
  </div>
  <script src="civitai-core.js"></script>
  <script src="options.js"></script>
</body>
</html>
